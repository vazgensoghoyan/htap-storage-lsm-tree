name: testing

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - "**"

jobs:
  testing:
    strategy:
      fail-fast: false
      matrix:
        runs-on:
          - ubuntu-latest
          - macos-latest
        mode:
          - Debug
          - Release

    runs-on: ${{ matrix.runs-on }}

    name: ${{ matrix.runs-on }} (${{ matrix.mode }})

    steps:
      - name: Clone the sources
        uses: actions/checkout@v3

      - name: build
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=${{ matrix.mode }} ..
          cmake --build . --parallel

      - name: test
        run: |
          cd build
          ctest --output-on-failure
